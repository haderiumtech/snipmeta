version: '3.8'

services:
  snipmeta:
    build: .
    container_name: snipmeta-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - RATE_LIMIT_WINDOW=15
      - RATE_LIMIT_MAX_REQUESTS=30
      - API_TIMEOUT=30000
    volumes:
      - ./logs:/app/logs
      - ./public:/app/public
    restart: always
    networks:
      - instatube-network
    # health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  instatube-network:
    driver: bridge
